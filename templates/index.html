<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Risk Predictor</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #e8f5e9);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2e7d32;
        }

        h3 {
            margin-top: 15px;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2e7d32;
            box-shadow: 0 0 5px rgba(46,125,50,0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1b5e20;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: #d32f2f;
        }

        .section-title {
            margin-top: 20px;
            font-weight: 600;
            color: #2e7d32;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Health Risk Prediction</h1>

    <form action="/predict" method="post">

        <div class="section-title">Personal Info</div>
        <input type="number" name="age" placeholder="Enter age" required>
        <input type="number" name="weight" placeholder="Enter weight (kg)" required>
        <input type="number" name="height" placeholder="Enter height (cm)" required>
        <input type="number" step="any" name="bmi" placeholder="Enter BMI" required>

        <div class="section-title">Lifestyle</div>

        <h3>Exercise Level</h3>
        <select name="exercise" required>
            <option value="none">None</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>

        <input type="number" name="sleep" placeholder="Sleep hours per day" required>

        <h3>Sugar Intake</h3>
        <select name="sugar_intake" required>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>

        <h3>Smoking</h3>
        <select name="smoking" required>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <h3>Alcohol</h3>
        <select name="alcohol" required>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <h3>Marital Status</h3>
        <select name="married" required>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <div class="section-title">Profession</div>
        <select name="profession" required>
            <option value="office_worker">Office Worker</option>
            <option value="teacher">Teacher</option>
            <option value="artist">Artist</option>
            <option value="farmer">Farmer</option>
            <option value="driver">Driver</option>
            <option value="engineer">Engineer</option>
            <option value="student">Student</option>
            <option value="doctor">Doctor</option>
        </select>

        <button type="submit">Predict Risk</button>
    </form>

    {% if prediction %}
        <div class="result">
            Prediction: {{ prediction }}
        </div>
    {% endif %}
</div>

</body>
</html>
